<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.chat-container {
  width: 350px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
  overflow: hidden;
}

.chat-header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.chat-box {
  height: 300px;
  overflow-y: auto;
  padding: 10px;
}

.user {
  text-align: right;
  margin: 8px 0;
  color: blue;
}

.bot {
  text-align: left;
  margin: 8px 0;
  color: green;
}

.chat-input {
  display: flex;
  border-top: 1px solid #ddd;
}

.chat-input input {
  flex: 1;
  padding: 10px;
  border: none;
}

.chat-input button {
  background: #2e7d32;
  color: white;
  border: none;
  padding: 10px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">AI Chatbot</div>

  <div id="chatbox" class="chat-box"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function sendMessage() {
  var userText = document.getElementById("userInput").value;

  fetch("/get", {
    method: "POST",
    body: new URLSearchParams({"msg": userText})
  })
  .then(response => response.text())
  .then(data => {
    document.getElementById("chatbox").innerHTML += 
    "<div class='user'>You: " + userText + "</div>" +
    "<div class='bot'>Bot: " + data + "</div>";
  });

  document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
