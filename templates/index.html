<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-container {
  width: 400px;
  height: 550px;
  background: #ffffff;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  overflow: hidden;
}

.chat-header {
  background: #0f2027;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

.message {
  margin: 8px 0;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 70%;
  font-size: 14px;
}

.user {
  background: #2c5364;
  color: white;
  align-self: flex-end;
}

.bot {
  background: #f1f1f1;
  color: #333;
  align-self: flex-start;
}

.chat-input {
  display: flex;
  border-top: 1px solid #ddd;
}

.chat-input input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

.chat-input button {
  background: #0f2027;
  color: white;
  border: none;
  padding: 0 20px;
  cursor: pointer;
  font-weight: bold;
}

.chat-input button:hover {
  background: #2c5364;
}
  .message {
  display: inline-block;
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">🤖 AI Assistant</div>

  <div id="chatbox" class="chat-box"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function sendMessage() {
  var userText = document.getElementById("userInput").value;
  if(userText.trim() === "") return;

  var chatbox = document.getElementById("chatbox");

  // User message
  chatbox.innerHTML += 
  "<div class='message user'>👤 " + userText + "</div>";

  // Typing animation
  chatbox.innerHTML += 
  "<div class='message bot' id='typing'>🤖 Typing...</div>";

  chatbox.scrollTop = chatbox.scrollHeight;

  fetch("/get", {
    method: "POST",
    body: new URLSearchParams({"msg": userText})
  })
  .then(response => response.text())
  .then(data => {

    // Remove typing
    document.getElementById("typing").remove();

    // Bot response
    chatbox.innerHTML += 
    "<div class='message bot'>🤖 " + data + "</div>";

    chatbox.scrollTop = chatbox.scrollHeight;
  });

  document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
