<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.chat-container {
  width: 380px;
  height: 520px;
  background: white;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  overflow: hidden;
}

.chat-header {
  background: #2a5298;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

.chat-box {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
}

.message {
  margin: 10px 0;
  padding: 10px 14px;
  border-radius: 15px;
  max-width: 75%;
}

.user {
  background: #2a5298;
  color: white;
  margin-left: auto;
  text-align: right;
}

.bot {
  background: #f1f1f1;
  color: #333;
}

.chat-input {
  display: flex;
  border-top: 1px solid #ddd;
}

.chat-input input {
  flex: 1;
  padding: 12px;
  border: none;
  outline: none;
}

.chat-input button {
  background: #2a5298;
  color: white;
  border: none;
  padding: 0 20px;
  cursor: pointer;
  font-weight: bold;
}

.chat-input button:hover {
  background: #1e3c72;
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">🤖 AI Assistant</div>

  <div id="chatbox" class="chat-box"></div>

  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function sendMessage() {
  var userText = document.getElementById("userInput").value;

  if(userText.trim() === "") return;

  document.getElementById("chatbox").innerHTML += 
  "<div class='message user'>" + userText + "</div>";

  fetch("/get", {
    method: "POST",
    body: new URLSearchParams({"msg": userText})
  })
  .then(response => response.text())
  .then(data => {
    document.getElementById("chatbox").innerHTML += 
    "<div class='message bot'>" + data + "</div>";

    document.getElementById("chatbox").scrollTop =
    document.getElementById("chatbox").scrollHeight;
  });

  document.getElementById("userInput").value = "";
}
</script>

</body>
</html>
